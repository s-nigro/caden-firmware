[platformio]
default_envs = wohnzimmer

; ── Gemeinsame Einstellungen ──────────────────────────────────────────────────
[env]
platform  = espressif32 @ ^6.5.0
framework = arduino
monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    knolleary/PubSubClient @ ^2.8        ; MQTT
    bblanchon/ArduinoJson @ ^7.0         ; JSON
    esphome/ESP32-audioI2S @ ^2.0.7      ; Audio I2S
    https://github.com/earlephilhower/arduino-vs1053 ; Fallback
    madhephaestus/ESP32Encoder @ ^0.11.1

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_ARDUHAL_LOG_COLORS=1

; ── Wohnzimmer: Waveshare ESP32-S3-Touch-LCD-1.85C-BOX-EN ────────────────────
[env:wohnzimmer]
board = esp32-s3-devkitc-1
board_build.mcu   = esp32s3
board_build.f_cpu = 240000000L
board_build.partitions = partitions_large.csv
upload_port  = /dev/cu.usbmodem31201
monitor_port = /dev/cu.usbmodem31201

build_flags =
    ${env.build_flags}
    -DCADEN_ROOM_ID='"wohnzimmer"'
    -DCADEN_HAS_DISPLAY=1
    -DCADEN_HAS_TOUCH=1
    ; ES7210 + ES8311 Pins (Waveshare Touch-LCD-1.85C-BOX)
    -DI2S_BCLK=9
    -DI2S_WS=45
    -DI2S_DIN=8       ; Mic input (ES7210)
    -DI2S_DOUT=46     ; Speaker output (ES8311)
    -DI2C_SDA=18
    -DI2C_SCL=17
    -DCODEC_PA_PIN=48  ; Power Amplifier

; ── Schlafzimmer: Waveshare ESP32-S3-AUDIO-Board-EN ──────────────────────────
[env:schlafzimmer]
board = esp32-s3-devkitc-1
board_build.mcu   = esp32s3
board_build.f_cpu = 240000000L
board_build.partitions = partitions_large.csv

build_flags =
    ${env.build_flags}
    -DCADEN_ROOM_ID='"schlafzimmer"'
    -DCADEN_HAS_DISPLAY=0
    -DCADEN_HAS_TOUCH=0
    ; Waveshare Audio-Board Pins
    -DI2S_BCLK=14
    -DI2S_WS=15
    -DI2S_DIN=32      ; Mic
    -DI2S_DOUT=16     ; Speaker
    -DI2C_SDA=21
    -DI2C_SCL=22
    -DCODEC_PA_PIN=-1
